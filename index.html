<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marathon Training Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#5D5CDE',
                        'primary-dark': '#4A49B8',
                    }
                }
            }
        };
    </script>
    <style>
        .workout-card {
            transition: all 0.2s ease;
            cursor: grab;
        }
        .workout-card:active {
            cursor: grabbing;
            transform: rotate(2deg) scale(1.05);
        }
        .workout-card.dragging {
            opacity: 0.5;
            transform: rotate(5deg);
        }
        .day-slot {
            min-height: 120px;
            transition: background-color 0.2s ease;
        }
        .day-slot.drag-over {
            background-color: rgba(93, 92, 222, 0.1);
            border: 2px dashed rgba(93, 92, 222, 0.3);
        }
        .completed-workout {
            background: linear-gradient(135deg, #10b981, #059669);
            border-color: #059669;
        }
        .completed-workout .text-gray-700,
        .completed-workout .text-gray-600,
        .completed-workout .text-gray-900 {
            color: #ffffff !important;
        }
        .dark .completed-workout .text-gray-200,
        .dark .completed-workout .text-gray-300 {
            color: #ffffff !important;
        }
        .modal-backdrop {
            backdrop-filter: blur(4px);
        }
        .custom-workout {
            border-left-color: #8B5CF6 !important;
        }
        /* Additional styles are omitted to save space */
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <div id="app" class="max-w-7xl mx-auto px-4 py-6">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-extrabold bg-gradient-to-r from-purple-500 via-blue-500 to-green-400 text-transparent bg-clip-text mb-6">
                George's Marathon Plan
            </h1>
        </div>

        <script>
            // Function to calculate weeks until a target date
            function calculateWeeksToGo() {
                const today = new Date();
                const raceDay = new Date('2026-04-12'); // Target date for the event
                const diffInMillis = raceDay - today;
                const weeksToGo = Math.ceil(diffInMillis / (1000 * 60 * 60 * 24 * 7));
                return weeksToGo;
            }

            // Function to dynamically update the "weeks to go" message
            function displayWeeksToGo() {
                const weeksToGo = calculateWeeksToGo();
                const weeksElement = document.getElementById('weeks-to-go');
                weeksElement.innerText = `${weeksToGo} weeks to go!`;
            }

            document.addEventListener('DOMContentLoaded', displayWeeksToGo);
        </script>

        <!-- Section above total distance with weeks to go -->
        <div class="mb-4 bg-gradient-to-r from-yellow-400 via-red-400 to-pink-500 rounded-2xl p-6 text-white shadow-md">
            <h2 class="text-xl font-bold mb-2">🏁 Countdown to Race Day</h2>
            <div id="weeks-to-go" class="text-2xl font-semibold">Calculating...</div>
        </div>

        <!-- Total Distance Gamified View -->
        <div class="mb-6 bg-gradient-to-r from-purple-600 via-blue-600 to-green-500 rounded-2xl p-6 text-white shadow-lg transform hover:scale-105 transition-all duration-300">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-lg font-semibold mb-2 flex items-center gap-2">
                        🏃‍♂️ Total Distance Covered
                    </h3>
                    <div class="text-4xl font-bold mb-2" id="total-distance">
                        0 km
                    </div>
                    <div class="text-sm opacity-90">
                        Keep pushing forward! 💪
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-6xl animate-pulse">🎯</div>
                    <div class="text-sm mt-2 opacity-90">
                        Target: 1000 km
                    </div>
                    <div class="w-24 bg-white/30 rounded-full h-2 mt-1">
                        <div class="bg-yellow-300 rounded-full h-2 transition-all duration-500" 
                            id="total-distance-progress" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div> <!-- Remaining sections are omitted for brevity --> </div>

    </div>
</body>
</html>
